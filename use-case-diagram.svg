<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1040" viewBox="0 0 1700 1040">
  <defs>
    <style>
      .bg { fill: #f1f5f9; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #111827; }
      .actor { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .system { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .usecase { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .line { stroke: #475569; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1040" />
  <text x="40" y="55" class="title">uEvent Use-Case Diagram (Code-Aligned)</text>

  <rect x="300" y="90" width="1320" height="900" rx="14" class="system" />
  <text x="330" y="125" class="label">uEvent System</text>

  <circle cx="120" cy="220" r="22" class="actor" />
  <line x1="120" y1="242" x2="120" y2="305" class="line" />
  <line x1="88" y1="265" x2="152" y2="265" class="line" />
  <line x1="120" y1="305" x2="93" y2="348" class="line" />
  <line x1="120" y1="305" x2="147" y2="348" class="line" />
  <text x="92" y="376" class="label">Guest</text>

  <circle cx="120" cy="450" r="22" class="actor" />
  <line x1="120" y1="472" x2="120" y2="535" class="line" />
  <line x1="88" y1="495" x2="152" y2="495" class="line" />
  <line x1="120" y1="535" x2="93" y2="578" class="line" />
  <line x1="120" y1="535" x2="147" y2="578" class="line" />
  <text x="98" y="606" class="label">User</text>

  <circle cx="120" cy="680" r="22" class="actor" />
  <line x1="120" y1="702" x2="120" y2="765" class="line" />
  <line x1="88" y1="725" x2="152" y2="725" class="line" />
  <line x1="120" y1="765" x2="93" y2="808" class="line" />
  <line x1="120" y1="765" x2="147" y2="808" class="line" />
  <text x="80" y="836" class="label">Organizer</text>

  <circle cx="120" cy="890" r="22" class="actor" />
  <line x1="120" y1="912" x2="120" y2="965" class="line" />
  <line x1="88" y1="935" x2="152" y2="935" class="line" />
  <line x1="120" y1="965" x2="98" y2="1000" class="line" />
  <line x1="120" y1="965" x2="142" y2="1000" class="line" />
  <text x="88" y="1020" class="label">Admin</text>

  <ellipse cx="560" cy="190" rx="125" ry="38" class="usecase" />
  <text x="496" y="196" class="small">Browse events</text>

  <ellipse cx="860" cy="190" rx="135" ry="38" class="usecase" />
  <text x="780" y="196" class="small">View event details</text>

  <ellipse cx="1170" cy="190" rx="145" ry="38" class="usecase" />
  <text x="1068" y="196" class="small">Register / Login (incl. Google)</text>

  <ellipse cx="560" cy="335" rx="150" ry="38" class="usecase" />
  <text x="468" y="341" class="small">Subscribe to event</text>

  <ellipse cx="860" cy="335" rx="150" ry="38" class="usecase" />
  <text x="758" y="341" class="small">Follow / unfollow organizer</text>

  <ellipse cx="1170" cy="335" rx="130" ry="38" class="usecase" />
  <text x="1108" y="341" class="small">Buy ticket</text>

  <ellipse cx="560" cy="490" rx="175" ry="38" class="usecase" />
  <text x="440" y="496" class="small">View in-app notifications</text>

  <ellipse cx="860" cy="490" rx="220" ry="38" class="usecase" />
  <text x="705" y="496" class="small">Receive "new event" alerts from followed orgs</text>

  <ellipse cx="1170" cy="490" rx="185" ry="38" class="usecase" />
  <text x="1046" y="496" class="small">Get payment email (optional)</text>

  <ellipse cx="560" cy="650" rx="140" ry="38" class="usecase" />
  <text x="477" y="656" class="small">Create event</text>

  <ellipse cx="860" cy="650" rx="155" ry="38" class="usecase" />
  <text x="759" y="656" class="small">Manage tickets / sales</text>

  <ellipse cx="1170" cy="650" rx="175" ry="38" class="usecase" />
  <text x="1051" y="656" class="small">Manage organization profile</text>

  <ellipse cx="560" cy="810" rx="180" ry="38" class="usecase" />
  <text x="440" y="816" class="small">Request withdrawal / verification</text>

  <ellipse cx="860" cy="810" rx="160" ry="38" class="usecase" />
  <text x="775" y="816" class="small">Admin panel</text>

  <ellipse cx="1170" cy="810" rx="205" ry="38" class="usecase" />
  <text x="1030" y="816" class="small">Moderate users/events + finance requests</text>

  <line x1="152" y1="260" x2="435" y2="190" class="line" />
  <line x1="152" y1="265" x2="725" y2="190" class="line" />
  <line x1="152" y1="270" x2="1025" y2="190" class="line" />

  <line x1="152" y1="495" x2="410" y2="335" class="line" />
  <line x1="152" y1="505" x2="710" y2="335" class="line" />
  <line x1="152" y1="515" x2="1040" y2="335" class="line" />
  <line x1="152" y1="525" x2="385" y2="490" class="line" />
  <line x1="152" y1="535" x2="640" y2="490" class="line" />
  <line x1="152" y1="545" x2="985" y2="490" class="line" />

  <line x1="152" y1="725" x2="420" y2="650" class="line" />
  <line x1="152" y1="735" x2="705" y2="650" class="line" />
  <line x1="152" y1="745" x2="995" y2="650" class="line" />
  <line x1="152" y1="755" x2="380" y2="810" class="line" />

  <line x1="152" y1="935" x2="700" y2="810" class="line" />
  <line x1="152" y1="945" x2="965" y2="810" class="line" />

  <rect x="1345" y="150" width="245" height="210" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5" />
  <text x="1360" y="178" class="small">Notes:</text>
  <text x="1360" y="204" class="small">- Followed orgs -> new event alerts</text>
  <text x="1360" y="228" class="small">- Event subscribe is separate preference</text>
  <text x="1360" y="252" class="small">- Payment email is conditional</text>
  <text x="1360" y="276" class="small">  (SMTP + user setting)</text>
  <text x="1360" y="300" class="small">- Success page can call reconcile</text>
  <text x="1360" y="324" class="small">  to recover missed side-effects</text>
</svg>
