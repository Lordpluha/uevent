services:
  postgres:
    image: postgres:16-alpine
    container_name: uevent-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uevent}
      POSTGRES_USER: ${POSTGRES_USER:-uevent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uevent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uevent} -d ${POSTGRES_DB:-uevent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: uevent-stripe-cli
    command: listen --forward-to http://api:3000/api/payments/webhook
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - postgres

volumes:
  postgres_data:
